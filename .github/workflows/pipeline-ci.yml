name: Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Daily run at 8am UTC
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: "auto"
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install Python dependencies
        run: |
          uv sync
          uv run dbt deps \
            --project-dir transform/dbt_pipeline \
            --profiles-dir transform/dbt_pipeline

      - name: Extract + Load
        run: uv run python scripts/run_extract.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOPICS: "data-engineering,dbt,duckdb,analytics,sql,airflow,spark,kafka,llm,mlops,streamlit,metabase"
          REPOS_PER_TOPIC: "30"
          DUCKDB_PATH: "${{ github.workspace }}/pipeline.duckdb"

      - name: dbt build
        run: |
          uv run dbt build \
            --project-dir transform/dbt_pipeline \
            --profiles-dir transform/dbt_pipeline
        env:
          DUCKDB_PATH: "${{ github.workspace }}/pipeline.duckdb"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Configure Evidence DuckDB path
        run: |
          cat > dashboard/sources/github_trends/connection.options.yaml << EOF
          filename: ${{ github.workspace }}/pipeline.duckdb
          EOF

      - name: Evidence sources
        run: npm run sources
        working-directory: dashboard

      - name: Evidence build
        run: npm run build
        working-directory: dashboard

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
