name: Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Daily run at 8am UTC
  schedule:
    - cron: '0 8 * * *'

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync
          uv run dbt deps \
            --project-dir transform/dbt_pipeline \
            --profiles-dir transform/dbt_pipeline

      - name: Extract + Load
        run: uv run python scripts/run_extract.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOPICS: "data-engineering,dbt,python,analytics"
          REPOS_PER_TOPIC: "30"
          DUCKDB_PATH: "./pipeline.duckdb"

      - name: dbt build
        run: |
          uv run dbt build \
            --project-dir transform/dbt_pipeline \
            --profiles-dir transform/dbt_pipeline
        env:
          DUCKDB_PATH: "./pipeline.duckdb"

      - name: Upload DuckDB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-duckdb
          path: pipeline.duckdb
          retention-days: 3
